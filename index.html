<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOKI168 - Live Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e0d3a 0%, #0f0518 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
            z-index: 9998;
            transition: transform 0.3s;
            animation: pulse 2s infinite;
        }

        .chat-button:hover {
            transform: scale(1.1);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(255, 215, 0, 0); }
        }

        .chat-button svg {
            width: 30px;
            height: 30px;
            fill: #000;
        }

        .chat-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 380px;
            max-width: 90vw;
            height: 600px;
            max-height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            padding: 20px;
            color: #000;
            position: relative;
        }

        .chat-header h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .close-chat {
            background: rgba(0, 0, 0, 0.1);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #000;
            transition: all 0.3s;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .close-chat:hover {
            background: rgba(0, 0, 0, 0.2);
            transform: scale(1.1);
        }

        .minimize-btn {
            background: rgba(0, 0, 0, 0.1);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: #000;
            position: absolute;
            top: 20px;
            right: 60px;
        }

        .minimize-btn:hover {
            background: rgba(0, 0, 0, 0.2);
            transform: scale(1.1);
        }

        .minimize-btn svg {
            width: 18px;
            height: 18px;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .online-indicator {
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            border: 2px solid #FFD700;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-login {
            padding: 30px 20px;
            background: white;
        }

        .chat-login h4 {
            margin-bottom: 20px;
            color: #333;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group label span {
            color: red;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #FFD700;
        }

        .btn-start {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-start:hover {
            transform: translateY(-2px);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.admin, .message.bot {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
            border-bottom-right-radius: 5px;
        }

        .message.admin .message-bubble, .message.bot .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-bubble a {
            color: #0066cc;
            text-decoration: underline;
            word-break: break-all;
            font-weight: 500;
        }

        .message-bubble a:hover {
            color: #0052a3;
            text-decoration: none;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            padding: 0 5px;
        }

        .typing-indicator {
            display: none;
            padding: 10px 15px;
            background: white;
            border-radius: 15px;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat-input-container {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            resize: none;
            max-height: 100px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #FFD700;
        }

        .btn-send {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .btn-send:hover {
            transform: scale(1.1);
        }

        .btn-send svg {
            width: 20px;
            height: 20px;
            fill: #000;
        }

        .transfer-message {
            background: #ffcc80 !important;
            color: #000 !important;
            font-weight: bold;
        }

        .rating-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .rating-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.3s ease;
        }

        .rating-content h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .rating-content p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .rating-stars {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .star {
            font-size: 40px;
            cursor: pointer;
            color: #ddd;
            transition: color 0.2s, transform 0.2s;
        }

        .star:hover {
            transform: scale(1.2);
        }

        .star.active {
            color: #FFD700;
        }

        .rating-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            resize: none;
            font-size: 14px;
        }

        .rating-textarea:focus {
            outline: none;
            border-color: #FFD700;
        }

        .btn-submit-rating {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit-rating:hover {
            transform: translateY(-2px);
        }

        .chat-ended-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .chat-ended-message svg {
            width: 80px;
            height: 80px;
            fill: #FFD700;
            margin-bottom: 20px;
        }

        .chat-ended-message h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .btn-new-chat {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-new-chat:hover {
            transform: scale(1.05);
        }

        /* Minimized State */
        .chat-window.minimized {
            height: auto;
        }

        .chat-window.minimized .chat-messages,
        .chat-window.minimized .chat-login,
        .chat-window.minimized .chat-input-container,
        .chat-window.minimized .chat-ended-message {
            display: none;
        }

        .chat-window.minimized .chat-header {
            cursor: pointer;
        }

        /* Minimized Indicator */
        .minimized-indicator {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
            display: none;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            z-index: 9998;
            animation: slideUp 0.3s ease;
        }

        .minimized-indicator.show {
            display: flex;
        }

        .minimized-indicator .online-indicator {
            width: 8px;
            height: 8px;
        }

        .minimized-indicator span {
            color: #000;
            font-weight: 600;
            font-size: 14px;
        }

        .close-minimized {
            background: rgba(0, 0, 0, 0.1);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 16px;
            line-height: 1;
        }

        .close-minimized:hover {
            background: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="chat-button" onclick="toggleChat()">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
        </svg>
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <button class="minimize-btn" onclick="minimizeChat()" title="Minimize">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 13H5v-2h14v2z"/>
                </svg>
            </button>
            <button class="close-chat" onclick="endChat()" title="Akhiri Percakapan">×</button>
            <div class="chat-header-info">
                <div class="online-indicator"></div>
                <div>
                    <h3>HOKI168 Support</h3>
                    <p id="chatStatus">Online - Biasanya membalas dalam hitungan menit</p>
                </div>
            </div>
        </div>

        <div class="chat-login" id="chatLogin">
            <h4>Selamat datang di live chat HOKI168</h4>
            <div class="form-group">
                <label>Username / ID : <span>*</span></label>
                <input type="text" id="usernameInput" placeholder="Masukkan Username / ID">
            </div>
            <button class="btn-start" onclick="startChat()">Mulai Percakapan</button>
        </div>

        <div class="chat-messages" id="chatMessages" style="display: none;">
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="chat-input-container" id="chatInput" style="display: none;">
            <textarea class="chat-input" id="messageInput" placeholder="Ketik pesan..." rows="1"></textarea>
            <button class="btn-send" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>

        <div class="chat-ended-message" id="chatEnded" style="display: none;">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
            <h3>Percakapan Berakhir</h3>
            <p>Terima kasih telah menghubungi kami</p>
            <button class="btn-new-chat" onclick="startNewChat()">Chat Baru</button>
        </div>
    </div>

    <!-- Minimized Indicator -->
    <div class="minimized-indicator" id="minimizedIndicator" onclick="minimizeChat()">
        <div class="online-indicator"></div>
        <span>HOKI168 Support</span>
        <button class="close-minimized" onclick="event.stopPropagation(); minimizeChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 13H5v-2h14v2z"/>
            </svg>
        </button>
    </div>

    <div class="rating-modal" id="ratingModal">
        <div class="rating-content">
            <h3>Bagaimana pelayanan kami?</h3>
            <p>Beri penilaian untuk membantu kami meningkatkan layanan</p>
            <div class="rating-stars" id="ratingStars">
                <span class="star" onclick="setRating(1)">★</span>
                <span class="star" onclick="setRating(2)">★</span>
                <span class="star" onclick="setRating(3)">★</span>
                <span class="star" onclick="setRating(4)">★</span>
                <span class="star" onclick="setRating(5)">★</span>
            </div>
            <textarea class="rating-textarea" id="ratingFeedback" placeholder="Tambahkan komentar (opsional)" rows="3"></textarea>
            <button class="btn-submit-rating" onclick="submitRating()">Kirim Penilaian</button>
        </div>
    </div>

    <script>
        let currentUser = '';
        let chatId = '';
        let currentRating = 0;
        let chatEnded = false;
        let isMinimized = false;

        function toggleChat() {
            const chatWindow = document.getElementById('chatWindow');
            if (chatWindow.style.display === 'flex') {
                chatWindow.style.display = 'none';
            } else {
                chatWindow.style.display = 'flex';
                if (currentUser && !chatEnded) {
                    loadMessages();
                }
            }
        }

        function minimizeChat() {
            const chatWindow = document.getElementById('chatWindow');
            const minimizedIndicator = document.getElementById('minimizedIndicator');
            
            isMinimized = !isMinimized;
            
            if (isMinimized) {
                chatWindow.classList.add('minimized');
                minimizedIndicator.classList.add('show');
            } else {
                chatWindow.classList.remove('minimized');
                minimizedIndicator.classList.remove('show');
            }
        }

        function startChat() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('Silakan masukkan username/ID!');
                return;
            }

            currentUser = username;
            chatId = 'chat_' + Date.now();
            chatEnded = false;
            
            localStorage.setItem('currentUser', currentUser);
            localStorage.setItem('currentChatId', chatId);
            localStorage.setItem('chatEnded_' + chatId, 'false');

            document.getElementById('chatLogin').style.display = 'none';
            document.getElementById('chatMessages').style.display = 'block';
            document.getElementById('chatInput').style.display = 'flex';
            document.getElementById('chatEnded').style.display = 'none';
            document.getElementById('chatStatus').textContent = 'Online - Biasanya membalas dalam hitungan menit';

            const welcomeMsg = {
                chatId: chatId,
                user: 'Bot',
                message: 'Selamat datang di HOKI168, apakah ada yang bisa saya bantu? ☺️',
                type: 'bot',
                time: new Date().toLocaleString('id-ID'),
                timestamp: Date.now()
            };

            let messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
            messages.push(welcomeMsg);
            localStorage.setItem('chat_messages', JSON.stringify(messages));

            loadMessages();
            setInterval(loadMessages, 2000);
        }

        function sendMessage() {
            if (chatEnded) {
                alert('Percakapan sudah berakhir. Silakan mulai chat baru.');
                return;
            }

            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;

            const msgData = {
                chatId: chatId,
                user: currentUser,
                message: message,
                type: 'user',
                time: new Date().toLocaleString('id-ID'),
                timestamp: Date.now()
            };

            let messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
            messages.push(msgData);
            localStorage.setItem('chat_messages', JSON.stringify(messages));

            input.value = '';
            loadMessages();
            setTimeout(() => checkBotResponse(message), 1000);
        }

        function checkBotResponse(userMessage) {
            if (chatEnded) return;

            const messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
            const chatMessages = messages.filter(m => m.chatId === chatId);
            const adminReplied = chatMessages.some(m => m.type === 'admin');
            
            if (adminReplied) {
                return;
            }

            const botSettings = JSON.parse(localStorage.getItem('bot_settings') || '{}');
            const isEnabled = botSettings.enabled || false;
            
            if (!isEnabled) return;

            const keywords = botSettings.keywords || [];
            let response = null;
            let bestMatchLength = 0;
            
            const userMessageLower = userMessage.toLowerCase().trim();

            for (let kwGroup of keywords) {
                if (kwGroup.keywords && Array.isArray(kwGroup.keywords)) {
                    for (let keyword of kwGroup.keywords) {
                        const keywordLower = keyword.toLowerCase().trim();
                        
                        if (userMessageLower.includes(keywordLower)) {
                            if (keywordLower.length > bestMatchLength) {
                                bestMatchLength = keywordLower.length;
                                response = kwGroup.response;
                            }
                        }
                    }
                } else if (kwGroup.keyword && userMessageLower.includes(kwGroup.keyword.toLowerCase())) {
                    if (!response) {
                        response = kwGroup.response;
                    }
                }
            }

            if (!response) {
                const transferEnabled = botSettings.transferToAdmin || false;
                
                if (transferEnabled) {
                    const transferStatus = JSON.parse(localStorage.getItem('chat_transfer_status') || '{}');
                    
                    if (!transferStatus[chatId]) {
                        response = "Sistem sedang menghubungkan Anda dengan admin. Silakan tunggu sebentar...";
                        
                        transferStatus[chatId] = true;
                        localStorage.setItem('chat_transfer_status', JSON.stringify(transferStatus));
                        
                        localStorage.setItem('newAdminChat', JSON.stringify({
                            chatId: chatId,
                            user: currentUser,
                            timestamp: Date.now()
                        }));
                    } else {
                        if (botSettings.defaultResponse) {
                            response = botSettings.defaultResponse;
                        }
                    }
                } else if (botSettings.defaultResponse) {
                    response = botSettings.defaultResponse;
                }
            }

            if (response) {
                showTyping();
                setTimeout(() => {
                    const botMsg = {
                        chatId: chatId,
                        user: 'Bot',
                        message: response,
                        type: 'bot',
                        time: new Date().toLocaleString('id-ID'),
                        timestamp: Date.now()
                    };

                    let messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
                    messages.push(botMsg);
                    localStorage.setItem('chat_messages', JSON.stringify(messages));
                    
                    hideTyping();
                    loadMessages();
                }, 1000);
            }
        }

        function showTyping() {
            document.getElementById('typingIndicator').style.display = 'block';
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            document.getElementById('typingIndicator').style.display = 'none';
        }

        function convertUrlToLink(text) {
            if (!text) return '';
            
            const lines = text.split('\n');
            
            const processedLines = lines.map(line => {
                const urlRegex = /(https?:\/\/[^\s<]+[^<.,:;"')\]\s])/g;
                return line.replace(urlRegex, function(url) {
                    return `<a href="${url}" target="_blank" style="color: #0066cc; text-decoration: underline; word-break: break-all; display: inline-block; margin: 2px 0;">${url}</a>`;
                });
            });
            
            return processedLines.join('<br>');
        }

        function loadMessages() {
            if (chatEnded) return;

            const messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
            const chatMessages = messages.filter(m => m.chatId === chatId);
            
            const container = document.getElementById('chatMessages');
            const typingIndicator = document.getElementById('typingIndicator');
            
            Array.from(container.children).forEach(child => {
                if (!child.classList.contains('typing-indicator')) {
                    container.removeChild(child);
                }
            });

            chatMessages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + msg.type;
                
                const bubbleClass = msg.type === 'bot' && msg.message.includes('menghubungkan') ? 'transfer-message' : '';
                
                const messageWithLinks = convertUrlToLink(msg.message);
                
                msgDiv.innerHTML = `
                    <div class="message-bubble ${bubbleClass}">${messageWithLinks}</div>
                    <div class="message-time">${msg.time}</div>
                `;
                container.insertBefore(msgDiv, typingIndicator);
            });

            container.scrollTop = container.scrollHeight;

            const adminReplied = chatMessages.some(m => m.type === 'admin');
            if (adminReplied) {
                document.getElementById('chatStatus').textContent = 'Admin sedang membalas...';
            }
        }

        function endChat() {
            if (chatEnded) {
                toggleChat();
                return;
            }

            if (confirm('Akhiri percakapan ini?')) {
                document.getElementById('ratingModal').style.display = 'flex';
            }
        }

        function setRating(stars) {
            currentRating = stars;
            const starElements = document.querySelectorAll('.star');
            starElements.forEach((star, index) => {
                if (index < stars) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        function submitRating() {
            if (currentRating === 0) {
                alert('Silakan beri penilaian bintang!');
                return;
            }

            const feedback = document.getElementById('ratingFeedback').value.trim();
            
            const ratings = JSON.parse(localStorage.getItem('chat_ratings') || '[]');
            ratings.push({
                chatId: chatId,
                user: currentUser,
                rating: currentRating,
                feedback: feedback,
                time: new Date().toLocaleString('id-ID'),
                timestamp: Date.now()
            });
            localStorage.setItem('chat_ratings', JSON.stringify(ratings));

            chatEnded = true;
            localStorage.setItem('chatEnded_' + chatId, 'true');

            document.getElementById('ratingModal').style.display = 'none';
            document.getElementById('chatMessages').style.display = 'none';
            document.getElementById('chatInput').style.display = 'none';
            document.getElementById('chatEnded').style.display = 'block';
            document.getElementById('chatStatus').textContent = 'Percakapan berakhir';

            alert('Terima kasih atas penilaian Anda!');
        }

        function startNewChat() {
            currentUser = '';
            chatId = '';
            chatEnded = false;
            currentRating = 0;
            isMinimized = false;
            
            localStorage.removeItem('currentUser');
            localStorage.removeItem('currentChatId');
            
            document.getElementById('chatLogin').style.display = 'block';
            document.getElementById('chatMessages').style.display = 'none';
            document.getElementById('chatInput').style.display = 'none';
            document.getElementById('chatEnded').style.display = 'none';
            document.getElementById('usernameInput').value = '';
            document.getElementById('chatStatus').textContent = 'Online - Biasanya membalas dalam hitungan menit';
            document.getElementById('minimizedIndicator').classList.remove('show');
        }

        window.onload = function() {
            const savedUser = localStorage.getItem('currentUser');
            const savedChatId = localStorage.getItem('currentChatId');
            if (savedUser && savedChatId) {
                currentUser = savedUser;
                chatId = savedChatId;
                chatEnded = localStorage.getItem('chatEnded_' + chatId) === 'true';
                
                if (chatEnded) {
                    document.getElementById('chatLogin').style.display = 'none';
                    document.getElementById('chatMessages').style.display = 'none';
                    document.getElementById('chatInput').style.display = 'none';
                    document.getElementById('chatEnded').style.display = 'block';
                    document.getElementById('chatStatus').textContent = 'Percakapan berakhir';
                } else {
                    document.getElementById('chatLogin').style.display = 'none';
                    document.getElementById('chatMessages').style.display = 'block';
                    document.getElementById('chatInput').style.display = 'flex';
                    loadMessages();
                    setInterval(loadMessages, 2000);
                }
            }
        };

        document.getElementById('messageInput')?.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
            else if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "\n" + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 1;
            }
        });

        // Click on header to restore when minimized
        document.querySelector('.chat-header')?.addEventListener('click', function(e) {
            if (isMinimized && !e.target.closest('.minimize-btn') && !e.target.closest('.close-chat')) {
                minimizeChat();
            }
        });
    </script>
</body>
</html>

            { name: "SixSixSix", image: "https://d2rzzcn1jnr24x.cloudfront.net/Images/providers/HACKSAW/HACKSAW_1534.jpg?v=20250528" }
        ];

        // State
        const providersData = { 'Pragmatic Play': pragmaticPool, 'PG Soft': pgsoftPool, 'No Limit City': nolimitPool, 'Hacksaw Gaming': hacksawPool };
        const batchIndices = { 'Pragmatic Play': 0, 'PG Soft': 0, 'No Limit City': 0, 'Hacksaw Gaming': 0 };
        let currentFilter = 'all';
        let countdownTime = ROTATION_INTERVAL_MS;

        // Functions
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) { randomIndex = Math.floor(Math.random() * currentIndex); currentIndex--; [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]]; }
            return array;
        }
        const getRandomPercentage = () => Math.floor(Math.random() * 60) + 35;
        const getRandomHot = () => Math.random() > 0.7;

        function setFilter(provider) {
            currentFilter = provider;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.provider === provider));
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            const providersToShow = currentFilter === 'all' ? Object.keys(providersData) : [currentFilter];

            providersToShow.forEach(providerName => {
                const pool = providersData[providerName];
                const currentIndex = batchIndices[providerName];
                let batch = pool.slice(currentIndex, currentIndex + SHOW_COUNT);
                if (batch.length < SHOW_COUNT) { batch = [...batch, ...pool.slice(0, SHOW_COUNT - batch.length)]; }
                batch = shuffleArray([...batch]); // Acak gambar

                const section = document.createElement('div');
                section.className = 'provider-section reveal active';
                const batchNum = Math.floor(currentIndex / SHOW_COUNT) + 1;

                section.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-semibold flex items-center gap-2">
                            <iconify-icon icon="solar:gamepad-linear" class="text-brand-400"></iconify-icon>
                            ${providerName}
                        </h2>
                        <span class="text-xs px-2 py-1 rounded bg-white/10 text-gray-400">Batch ${batchNum}</span>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-6 gap-4" id="grid-${providerName.replace(/\s/g, '')}"></div>
                `;
                container.appendChild(section);

                const grid = document.getElementById(`grid-${providerName.replace(/\s/g, '')}`);
                batch.forEach(game => {
                    const percentage = getRandomPercentage();
                    const pColor = percentage >= 80 ? 'bg-brand-500' : percentage >= 60 ? 'bg-yellow-500' : 'bg-red-500';
                    const tColor = percentage >= 80 ? 'text-brand-400' : percentage >= 60 ? 'text-yellow-400' : 'text-red-400';
                    const isHot = getRandomHot();

                    const card = document.createElement('div');
                    card.className = `game-card rounded-2xl bg-white/5 border border-white/10 overflow-hidden cursor-pointer ${isHot ? 'pulse-glow' : ''}`;
                    card.innerHTML = `
                        <div class="relative overflow-hidden">
                            <img src="${game.image}" alt="${game.name}" class="game-image w-full aspect-square object-cover transition-transform duration-500">
                            <div class="play-overlay absolute inset-0 bg-black/60 flex items-center justify-center z-10">
                                <a href="${PLAY_LINK}" target="_blank" class="px-4 py-2 rounded-lg bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-semibold text-xs shadow-lg transform hover:scale-105 transition-all flex items-center gap-2">
                                    <iconify-icon icon="solar:play-bold" class="text-base"></iconify-icon>BERMAIN
                                </a>
                            </div>
                            ${isHot ? `<div class="absolute top-2 right-2 px-2 py-1 rounded-full bg-orange-500/90 text-xs font-medium hot-badge flex items-center gap-1 z-20"><iconify-icon icon="solar:fire-bold"></iconify-icon>HOT</div>` : ''}
                            ${percentage >= 85 ? `<div class="absolute top-2 left-2 px-2 py-1 rounded-full bg-brand-500/90 text-xs font-medium flex items-center gap-1 z-20"><iconify-icon icon="solar:star-bold"></iconify-icon>GACOR</div>` : ''}
                        </div>
                        <div class="p-3">
                            <h3 class="font-medium text-sm truncate">${game.name}</h3>
                            <p class="text-xs text-gray-500 mb-2">${providerName}</p>
                            <div class="space-y-1">
                                <div class="flex items-center justify-between">
                                    <span class="text-xs text-gray-400">Win Rate</span>
                                    <span class="font-pixel font-bold ${tColor}">${percentage}%</span>
                                </div>
                                <div class="h-1.5 rounded-full bg-white/10 overflow-hidden">
                                    <div class="percentage-bar h-full rounded-full ${pColor}" style="width: ${percentage}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function rotateBatches() {
            for (let name in providersData) {
                let idx = batchIndices[name] + SHOW_COUNT;
                if (idx >= providersData[name].length) idx = 0;
                batchIndices[name] = idx;
            }
            renderContent();
            countdownTime = ROTATION_INTERVAL_MS;
        }

        function updateCountdown() {
            if (countdownTime <= 0) rotateBatches();
            else countdownTime -= 1000;

            // Format M:SS atau SS
            const minutes = Math.floor(countdownTime / (1000 * 60));
            const seconds = Math.floor((countdownTime % (1000 * 60)) / 1000);
            
            // Jika 0 menit, tampilkan saja detik
            if (minutes > 0) {
                 document.getElementById('countdown-timer').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            } else {
                 document.getElementById('countdown-timer').textContent = `${seconds.toString().padStart(2, '0')}s`;
            }
        }

        renderContent();
        setInterval(updateCountdown, 1000);
    </script>

      frameborder="0"
      allow="microphone"
    ></iframe>

<style>
/* Chat Widget Styles */
#hoki168-chat-widget {
  position: fixed;
  bottom: 30px;
  right: 30px;
  z-index: 99999;
}

#chat-widget-button {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
  position: relative;
  transition: all 0.3s ease;
  animation: chatPulse 2s infinite;
}

#chat-widget-button:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 30px rgba(255, 215, 0, 0.7);
}

@keyframes chatPulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7);
  }
  50% {
    box-shadow: 0 0 0 20px rgba(255, 215, 0, 0);
  }
}

#chat-notification-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: #ff4444;
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: bold;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

#chat-widget-container {
  position: fixed;
  bottom: 100px;
  right: 30px;
  width: 380px;
  height: 600px;
  max-width: 90vw;
  max-height: 80vh;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  animation: slideUp 0.3s ease;
  z-index: 99999;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

#hoki168-chat-iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 20px;
}

/* Responsive */
@media (max-width: 768px) {
  #chat-widget-container {
    width: 90vw;
    height: 70vh;
    bottom: 100px;
    right: 5vw;
  }
  
  #chat-widget-button {
    width: 55px;
    height: 55px;
  }
}
</style>

<script>
// Toggle Chat
function toggleHokiChat() {
  var container = document.getElementById('chat-widget-container');
  var badge = document.getElementById('chat-notification-badge');
  
  if (container.style.display === 'none' || container.style.display === '') {
    container.style.display = 'block';
    if (badge) badge.style.display = 'none';
  } else {
    container.style.display = 'none';
  }
}

// Close chat when clicking outside
document.addEventListener('click', function(event) {
  var widget = document.getElementById('hoki168-chat-widget');
  var container = document.getElementById('chat-widget-container');
  
  if (!widget.contains(event.target) && container.style.display === 'block') {
    container.style.display = 'none';
  }
});
</script>
<!-- End HOKI168 Live Chat Widget -->
